<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&family=Bebas+Neue&family=Montserrat:wght@600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f1f5f9;
            --surface: #ffffff; --text: #0f172a; --border: #cbd5e1; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        body { margin: 0; background-color: var(--bg); display: flex; height: 100vh; overflow: hidden; color: var(--text); }

        /* Sidebar */
        #sidebar { width: 300px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; z-index: 10; }
        .brand { padding: 20px; font-size: 1.4rem; font-weight: 700; border-bottom: 1px solid var(--border); color: var(--primary); }
        .status-bar { padding: 5px 20px; font-size: 11px; background: #f8fafc; border-bottom: 1px solid var(--border); color: #64748b; }
        
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .sidebar-footer { padding: 20px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }

        .section-title { font-size: 11px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }
        button, .btn-label {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all 0.2s; width: 100%; display: block; text-align: center;
        }
        button:hover, .btn-label:hover { border-color: var(--primary); background: #f5f3ff; }
        button.primary { background: var(--primary); color: white; border: none; }
        button.danger { color: var(--danger); border-color: #fca5a5; }

        /* Main Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; }
        #topbar {
            height: 70px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 20px; gap: 20px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
        }
        #topbar.active { opacity: 1; pointer-events: all; }
        
        .control-group { display: flex; flex-direction: column; gap: 4px; }
        .control-group label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        
        select, input[type="color"], input[type="number"] { padding: 5px; border: 1px solid var(--border); border-radius: 4px; }
        input[type="number"] { width: 50px; }

        #workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 40px; }
        
        /* Modal */
        #savesModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 450px; }
        .save-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }

        @media print {
            #sidebar, #topbar { display: none !important; }
            body { background: white; }
            #workspace { padding: 0; display: block; }
            .canvas-container { box-shadow: none !important; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">Card Maker Pro</div>
        <div class="status-bar" id="saveStatus">Project: Unsaved</div>
        
        <div class="sidebar-scroll">
            <div class="section-title">Add Elements</div>
            <button onclick="addText()">+ Add Text</button>
            <label class="btn-label">+ Add Image<input type="file" id="imageUpload" accept="image/*"></label>
            
            <div class="divider"></div>
            <div class="section-title">Card Settings</div>
            <div class="control-group">
                <label>Background Color</label>
                <input type="color" id="bgColor" value="#ffffff" onchange="updateCanvasBg(this.value)">
            </div>
            <button onclick="toggleOrientation()">🔄 Swap Orientation</button>

            <div class="divider"></div>
            <div class="section-title">Layers</div>
            <div style="display: flex; gap: 5px;">
                <button onclick="moveLayer('up')">Forward</button>
                <button onclick="moveLayer('down')">Backward</button>
            </div>
            <button onclick="deleteSelected()" class="danger">Delete Selected</button>
        </div>

        <div class="sidebar-footer">
            <button onclick="saveProject()">💾 Manual Save / New</button>
            <button onclick="openSavesModal()">📁 Open Saved</button>
            <button class="primary" onclick="downloadCard()">⬇️ Download PNG</button>
            <button onclick="window.print()">🖨️ Print</button>
        </div>
    </div>

    <div id="main">
        <div id="topbar">
            <div class="control-group">
                <label>Font</label>
                <select id="fontFamily" onchange="updateTextProperty('fontFamily', this.value)">
                    <option value="Roboto">Roboto</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Pacifico">Pacifico</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Playfair Display">Playfair</option>
                </select>
            </div>
            <div class="control-group"><label>Text Color</label><input type="color" id="textColor" onchange="updateTextProperty('fill', this.value)"></div>
            <div class="control-group"><label>Outline Color</label><input type="color" id="strokeColor" onchange="updateTextProperty('stroke', this.value)"></div>
            <div class="control-group"><label>Outline Width</label><input type="number" id="strokeWidth" min="0" max="20" onchange="updateTextProperty('strokeWidth', this.value)"></div>
            <div class="control-group"><label>Opacity</label><input type="number" id="opacity" min="0.1" max="1" step="0.1" value="1" onchange="updateTextProperty('opacity', this.value)"></div>
        </div>
        <div id="workspace"><canvas id="cardCanvas"></canvas></div>
    </div>

    <div id="savesModal">
        <div class="modal-content">
            <h2 style="margin-top:0">My Saved Cards</h2>
            <div id="savesList"></div>
            <button onclick="document.getElementById('savesModal').style.display='none'" style="margin-top:15px">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
