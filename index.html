<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Card Maker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #f3f4f6;
            --surface: #ffffff;
            --text: #1f2937;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        body {
            margin: 0;
            background-color: var(--bg);
            display: flex;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }

        /* Sidebar */
        #sidebar {
            width: 280px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            z-index: 10;
        }

        .brand {
            padding: 20px;
            font-size: 1.5rem;
            font-weight: 700;
            border-bottom: 1px solid var(--border);
            color: var(--primary);
        }

        .tools { padding: 20px; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; }

        button, .btn-label {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
            width: 100%;
            display: block;
        }

        button:hover, .btn-label:hover { border-color: var(--primary); color: var(--primary); }
        button.primary { background: var(--primary); color: white; border: none; }
        button.primary:hover { background: var(--primary-hover); color: white; }
        
        input[type="file"] { display: none; }
        .divider { height: 1px; background: var(--border); margin: 10px 0; }

        /* Main Workspace */
        #main {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Contextual Top Bar for Text/Object properties */
        #topbar {
            height: 60px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 15px;
            opacity: 0; /* Hidden by default */
            pointer-events: none;
            transition: opacity 0.2s;
        }

        #topbar.active { opacity: 1; pointer-events: all; }

        select, input[type="color"] {
            padding: 8px;
            border: 1px solid var(--border);
            border-radius: 6px;
            outline: none;
            cursor: pointer;
        }

        /* Canvas Area */
        #workspace {
            flex-grow: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: auto;
            padding: 40px;
        }

        .canvas-container { box-shadow: 0 10px 30px rgba(0,0,0,0.1); }

        /* Saves Modal */
        #savesModal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            display: none; justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 12px;
            width: 400px; max-height: 80vh; overflow-y: auto;
        }
        .save-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px; border-bottom: 1px solid var(--border);
        }
        .save-item button { width: auto; padding: 6px 12px; }

        @media print {
            body { background: white; }
            #sidebar, #topbar { display: none !important; }
            #workspace { padding: 0; align-items: flex-start; justify-content: flex-start; }
            .canvas-container { box-shadow: none; }
            @page { margin: 0; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">Card Maker</div>
        <div class="tools">
            <button onclick="addText()">+ Add Text</button>
            <label class="btn-label">
                + Add Image
                <input type="file" id="imageUpload" accept="image/*">
            </label>
            
            <div class="divider"></div>
            
            <button onclick="toggleOrientation()">🔄 Swap Orientation</button>
            <button onclick="deleteSelected()" style="color: #dc3545; border-color: #dc3545;">🗑️ Delete Selected</button>
            
            <div class="divider"></div>
            
            <button class="primary" onclick="saveProject()">💾 Save to Device</button>
            <button onclick="openSavesModal()">📁 Open Saved Cards</button>
            
            <div class="divider"></div>
            
            <button class="primary" onclick="downloadCard()">⬇️ Download Image</button>
            <button onclick="window.print()">🖨️ Print Card</button>
        </div>
    </div>

    <div id="main">
        <div id="topbar">
            <select id="fontFamily" onchange="updateTextProperty('fontFamily', this.value)">
                <option value="Roboto">Roboto</option>
                <option value="Pacifico">Pacifico</option>
                <option value="Bebas Neue">Bebas Neue</option>
                <option value="Arial">Arial</option>
            </select>
            
            <div style="display: flex; align-items: center; gap: 5px;">
                <label style="font-size: 14px;">Color:</label>
                <input type="color" id="textColor" onchange="updateTextProperty('fill', this.value)">
            </div>
        </div>

        <div id="workspace">
            <canvas id="cardCanvas"></canvas>
        </div>
    </div>

    <div id="savesModal">
        <div class="modal-content">
            <h2 style="margin-top: 0;">My Saved Cards</h2>
            <div id="savesList"></div>
            <button onclick="closeSavesModal()" style="margin-top: 20px;">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
