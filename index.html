<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Card Maker Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Roboto:wght@400;700&family=Bebas+Neue&family=Montserrat:wght@600&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4f46e5; --primary-hover: #4338ca; --bg: #f1f5f9;
            --surface: #ffffff; --text: #0f172a; --border: #cbd5e1; --danger: #ef4444;
        }
        * { box-sizing: border-box; font-family: 'Roboto', sans-serif; }
        
        /* Base layout: Desktop */
        body { 
            margin: 0; background-color: var(--bg); display: flex; 
            flex-direction: row; height: 100vh; overflow: hidden; color: var(--text); 
        }

        /* Sidebar UI */
        #sidebar { 
            width: 300px; background: var(--surface); border-right: 1px solid var(--border); 
            display: flex; flex-direction: column; z-index: 10; flex-shrink: 0;
        }
        .brand { padding: 15px 20px; font-size: 1.3rem; font-weight: 700; border-bottom: 1px solid var(--border); color: var(--primary); }
        .status-bar { padding: 5px 20px; font-size: 11px; background: #f8fafc; border-bottom: 1px solid var(--border); color: #64748b; }
        
        .sidebar-scroll { flex-grow: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; }
        .sidebar-footer { padding: 15px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; background: var(--surface); }

        .section-title { font-size: 10px; color: #64748b; font-weight: 700; text-transform: uppercase; margin-bottom: 2px; letter-spacing: 0.5px; }
        
        button, .btn-label {
            background: var(--surface); border: 1px solid var(--border); color: var(--text);
            padding: 10px; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600;
            transition: all 0.2s; width: 100%; display: block; text-align: center;
        }
        button:hover, .btn-label:hover { border-color: var(--primary); background: #f5f3ff; }
        button.primary { background: var(--primary); color: white; border: none; }
        button.primary:hover { background: var(--primary-hover); }
        button.danger { color: var(--danger); border-color: #fca5a5; }
        button.danger:hover { background: #fef2f2; border-color: var(--danger); }
        
        input[type="file"] { display: none; }
        .divider { height: 1px; background: var(--border); margin: 5px 0; }

        /* Main Workspace Area */
        #main { flex-grow: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        /* Horizontal Toolbar for Text Properties */
        #topbar {
            height: 65px; background: var(--surface); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; padding: 0 15px; gap: 15px;
            opacity: 0; pointer-events: none; transition: opacity 0.2s;
            overflow-x: auto; /* Allow horizontal scrolling on small screens */
            white-space: nowrap;
        }
        #topbar.active { opacity: 1; pointer-events: all; }
        
        .control-group { display: flex; flex-direction: column; gap: 4px; flex-shrink: 0; }
        .control-group label { font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
        
        select, input[type="color"], input[type="number"] { padding: 6px; border: 1px solid var(--border); border-radius: 4px; background: white; font-size: 13px; }
        input[type="number"] { width: 55px; }
        input[type="color"] { padding: 2px; width: 32px; height: 32px; cursor: pointer; }

        /* Canvas Wrapper & Container */
        #workspace { flex-grow: 1; display: flex; justify-content: center; align-items: center; overflow: auto; padding: 20px; }
        
        /* CRITICAL: Force the Fabric.js canvas to scale down responsively */
        .canvas-container { 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
            background: white; 
            max-width: 100% !important; 
            height: auto !important; 
        }
        .canvas-container canvas { 
            max-width: 100% !important; 
            height: auto !important; 
        }

        #savesModal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 100; padding: 15px; }
        .modal-content { background: white; padding: 20px; border-radius: 12px; width: 100%; max-width: 450px; max-height: 80vh; overflow-y: auto; }
        .save-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #eee; }
        .save-item:last-child { border-bottom: none; }
        .save-item button { width: auto; padding: 6px 12px; }

        /* RESPONSIVE BREAKPOINT: Mobile & Tablet */
        @media (max-width: 768px) {
            body { flex-direction: column; }
            
            #sidebar { 
                width: 100%; height: auto; border-right: none; border-top: 1px solid var(--border);
                order: 3; /* Move tools to the bottom for thumbs */
            }
            .brand { display: none; } /* Hide brand logo to save vertical space on mobile */
            
            .sidebar-scroll { 
                flex-direction: row; overflow-x: auto; overflow-y: hidden; 
                height: 70px; padding: 10px; gap: 10px; align-items: center;
            }
            .sidebar-scroll .divider, .sidebar-scroll .section-title { display: none; } /* Simplify on mobile */
            
            .sidebar-scroll button, .sidebar-scroll .btn-label { width: auto; white-space: nowrap; padding: 8px 15px; }
            .sidebar-scroll .control-group { flex-direction: row; align-items: center; }
            
            #main { order: 1; height: calc(100vh - 180px); } /* Canvas takes upper portion */
            #topbar { order: 2; border-top: 1px solid var(--border); } /* Controls bridge canvas and sidebar */
            
            #workspace { padding: 10px; }
            .sidebar-footer { flex-direction: row; overflow-x: auto; padding: 10px; }
            .sidebar-footer button { width: auto; flex: 1; white-space: nowrap; }
        }

        @media print {
            #sidebar, #topbar { display: none !important; }
            body { background: white; }
            #workspace { padding: 0; display: block; }
            .canvas-container { box-shadow: none !important; border: none !important; }
        }
    </style>
</head>
<body>

    <div id="sidebar">
        <div class="brand">✨ Card Maker Pro</div>
        <div class="status-bar" id="saveStatus">Project: Unsaved</div>
        
        <div class="sidebar-scroll">
            <div class="section-title">Add Elements</div>
            <button onclick="addText()">+ Add Text</button>
            <label class="btn-label">+ Add Image<input type="file" id="imageUpload" accept="image/*"></label>
            
            <div class="divider"></div>
            <div class="section-title">Card Settings</div>
            <div class="control-group">
                <label>BG Color</label>
                <input type="color" id="bgColor" value="#ffffff" onchange="updateCanvasBg(this.value)">
            </div>
            <button onclick="toggleOrientation()">🔄 Swap Orientation</button>

            <div class="divider"></div>
            <div class="section-title">Layers</div>
            <div style="display: flex; gap: 5px;">
                <button onclick="moveLayer('up')">Forward</button>
                <button onclick="moveLayer('down')">Backward</button>
            </div>
            <button onclick="deleteSelected()" class="danger">Delete Selected</button>
        </div>

        <div class="sidebar-footer">
            <button onclick="saveProject()">💾 Save / New</button>
            <button onclick="openSavesModal()">📁 Load</button>
            <button class="primary" onclick="downloadCard()">⬇️ Download</button>
            <button onclick="window.print()">🖨️ Print</button>
        </div>
    </div>

    <div id="main">
        <div id="topbar">
            <div class="control-group">
                <label>Font</label>
                <select id="fontFamily" onchange="updateTextProperty('fontFamily', this.value)">
                    <option value="Roboto">Roboto</option>
                    <option value="Montserrat">Montserrat</option>
                    <option value="Pacifico">Pacifico</option>
                    <option value="Bebas Neue">Bebas Neue</option>
                    <option value="Playfair Display">Playfair</option>
                </select>
            </div>
            <div class="control-group"><label>Text</label><input type="color" id="textColor" onchange="updateTextProperty('fill', this.value)"></div>
            <div class="control-group"><label>Outline</label><input type="color" id="strokeColor" onchange="updateTextProperty('stroke', this.value)"></div>
            <div class="control-group"><label>Thickness</label><input type="number" id="strokeWidth" min="0" max="20" onchange="updateTextProperty('strokeWidth', this.value)"></div>
            <div class="control-group"><label>Opacity</label><input type="number" id="opacity" min="0.1" max="1" step="0.1" value="1" onchange="updateTextProperty('opacity', this.value)"></div>
        </div>
        
        <div id="workspace">
            <canvas id="cardCanvas"></canvas>
        </div>
    </div>

    <div id="savesModal">
        <div class="modal-content">
            <h2 style="margin-top:0; font-size: 1.2rem;">My Saved Cards</h2>
            <div id="savesList"></div>
            <button onclick="document.getElementById('savesModal').style.display='none'" style="margin-top:15px">Close</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
